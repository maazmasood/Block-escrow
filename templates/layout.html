<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DBlock Escrow | {% block title %}Dashboard{% endblock %}</title>
    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
        crossorigin="anonymous">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <!-- Web3.js -->
    <script src="https://cdn.jsdelivr.net/npm/web3@1.10.0/dist/web3.min.js"></script>
    <!-- Contract Files -->
    <script src="{{ url_for('static', filename='contract/abi.js') }}"></script>
    <script src="{{ url_for('static', filename='contract/bytecode.js') }}"></script>
    <script src="{{ url_for('static', filename='accounts_data.js') }}"></script>
</head>

<body>
    <div class="d-flex" id="wrapper">
        <!-- Sidebar -->
        <div class="bg-dark-glass border-end" id="sidebar-wrapper">
            <div
                class="sidebar-heading text-center py-4 primary-text fs-4 fw-bold text-uppercase border-bottom border-secondary">
                <i class="fas fa-cube me-2"></i>DBlock
            </div>
            <div class="list-group list-group-flush my-3">
                <a href="{{ url_for('dashboard') }}"
                    class="list-group-item list-group-item-action bg-transparent second-text {% if request.endpoint == 'dashboard' %}active{% endif %}">
                    <i class="fas fa-tachometer-alt me-2"></i>Dashboard
                </a>

                <a href="{{ url_for('create_contract') }}"
                    class="list-group-item list-group-item-action bg-transparent second-text {% if request.endpoint == 'create_contract' %}active{% endif %}">
                    <i class="fas fa-plus-circle me-2"></i>Create Contract
                </a>

                <a href="{{ url_for('contract_details') }}"
                    class="list-group-item list-group-item-action bg-transparent second-text {% if request.endpoint == 'contract_details' %}active{% endif %}">
                    <i class="fas fa-file-contract me-2"></i>Contract Details
                </a>

                <a href="{{ url_for('transactions') }}"
                    class="list-group-item list-group-item-action bg-transparent second-text {% if request.endpoint == 'transactions' %}active{% endif %}">
                    <i class="fas fa-project-diagram me-2"></i>Transactions
                </a>
                <a href="{{ url_for('audits') }}"
                    class="list-group-item list-group-item-action bg-transparent second-text {% if request.endpoint == 'audits' %}active{% endif %}">
                    <i class="fas fa-chart-line me-2"></i>Audits & Logs
                </a>
                <a href="{{ url_for('notifications') }}"
                    class="list-group-item list-group-item-action bg-transparent second-text {% if request.endpoint == 'notifications' %}active{% endif %}">
                    <i class="fas fa-bell me-2"></i>Notifications
                </a>
                <a href="#" class="list-group-item list-group-item-action bg-transparent text-danger fw-bold mt-5">
                    <i class="fas fa-power-off me-2"></i>Logout
                </a>
            </div>
        </div>
        <!-- /#sidebar-wrapper -->

        <!-- Page Content -->
        <div id="page-content-wrapper">
            <nav class="navbar navbar-expand-lg navbar-dark bg-transparent py-4 px-4">
                <div class="d-flex align-items-center">
                    <i class="fas fa-align-left primary-text fs-4 me-3" id="menu-toggle"></i>
                    <h2 class="fs-2 m-0 text-white fw-bold">{% block page_title %}Overview{% endblock %}</h2>
                </div>

                <button class="navbar-toggler" type="button" data-bs-toggle="collapse"
                    data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent"
                    aria-expanded="false" aria-label="Toggle navigation">
                    <span class="navbar-toggler-icon"></span>
                </button>

                <div class="collapse navbar-collapse" id="navbarSupportedContent">
                    <ul class="navbar-nav ms-auto mb-2 mb-lg-0">
                        <ul class="navbar-nav ms-auto mb-2 mb-lg-0 align-items-center">
                            <!-- Network Switcher -->
                            <li class="nav-item me-3">
                                <div class="dropdown">
                                    <button class="btn btn-outline-info rounded-pill border border-secondary dropdown-toggle px-3" type="button" data-bs-toggle="dropdown">
                                        <i class="fas fa-network-wired me-2"></i><span id="currentNetworkLabel">ETH</span>
                                    </button>
                                    <ul class="dropdown-menu dropdown-menu-end bg-dark-glass border-secondary shadow-lg">
                                        <li><a class="dropdown-item text-white" href="#" onclick="switchNetwork('ETH')">ETH (Port 8545)</a></li>
                                        <li><a class="dropdown-item text-white" href="#" onclick="switchNetwork('BNB')">BNB (Port 8546)</a></li>
                                    </ul>
                                </div>
                            </li>
                            
                            <li class="nav-item">
                                <div class="dropdown">
                                    <button
                                        class="btn btn-dark rounded-pill border border-secondary dropdown-toggle d-flex align-items-center px-3"
                                        type="button" id="accountDropdownBtn" data-bs-toggle="dropdown"
                                        aria-expanded="false">
                                        <i class="fas fa-wallet text-warning me-2"></i>
                                        <span id="selectedAccountDisplay"
                                            class="fw-bold text-white me-1">Connecting...</span>
                                    </button>
                                    <ul class="dropdown-menu dropdown-menu-end bg-dark-glass border-secondary shadow-lg mt-2"
                                        id="accountList" style="min-width: 320px; max-height: 400px; overflow-y: auto;">
                                        <!-- JS will populate this -->
                                        <li><span class="dropdown-item-text text-muted">Loading accounts...</span></li>
                                    </ul>
                                </div>
                            </li>
                        </ul>
                    </ul>
                </div>
            </nav>

            <div class="container-fluid px-4">
                {% block content %}{% endblock %}
            </div>
        </div>
    </div>
    <!-- /#page-content-wrapper -->

    <!-- Bootstrap Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        crossorigin="anonymous"></script>
    <script>
        var el = document.getElementById("wrapper");
        var toggleButton = document.getElementById("menu-toggle");

        toggleButton.onclick = function () {
            el.classList.toggle("toggled");
        };
    </script>
    <!-- Custom Logic -->
    <script src="{{ url_for('static', filename='script.js') }}"></script>
    {% block scripts %}{% endblock %}
</body>

</html>
