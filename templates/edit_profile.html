{% extends "layout.html" %}

{% block title %}Edit Profile{% endblock %}
{% block page_title %}Edit Profile{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-7">
        <div class="card border-0 shadow-sm">
            <div class="card-header bg-transparent py-3 d-flex align-items-center">
                <i class="fas fa-user-edit primary-text fs-5 me-2"></i>
                <h5 class="mb-0 fw-bold text-dark">Update Account Profile</h5>
            </div>
            <div class="card-body p-4">
                <form id="editProfileForm">
                    <div class="mb-3 text-center">
                        <img id="profilePreview" src="" alt="Profile Preview"
                            style="width:90px;height:90px;border-radius:50%;object-fit:cover;display:none;border:2px solid #e5e7eb;">
                    </div>

                    <div class="mb-3">
                        <label for="profileWallet" class="form-label fw-bold text-dark">Wallet Address</label>
                        <input type="text" class="form-control font-monospace" id="profileWallet" disabled>
                    </div>

                    <div class="mb-3">
                        <label for="profileName" class="form-label fw-bold text-dark">Name</label>
                        <input type="text" class="form-control" id="profileName" placeholder="Enter your display name" required>
                    </div>

                    <div class="mb-4">
                        <label for="profileEmail" class="form-label fw-bold text-dark">Email</label>
                        <input type="email" class="form-control" id="profileEmail" placeholder="Enter your email" required>
                    </div>

                    <div class="mb-3">
                        <label for="profileBio" class="form-label fw-bold text-dark">Bio</label>
                        <textarea class="form-control" id="profileBio" rows="3"
                            placeholder="Short professional bio..."></textarea>
                    </div>

                    <div class="row" id="professionalFieldsRow">
                        <div class="col-md-6 mb-3">
                            <label for="profileNiche" class="form-label fw-bold text-dark">Niche</label>
                            <input type="text" class="form-control" id="profileNiche"
                                placeholder="e.g. Electronics Logistics">
                        </div>
                        <div class="col-md-6 mb-3">
                            <label for="profileRate" class="form-label fw-bold text-dark">Rate</label>
                            <input type="text" class="form-control" id="profileRate"
                                placeholder="e.g. $120/day or 3%">
                        </div>
                    </div>

                    <div class="mb-3">
                        <label for="profileAreaCoverage" class="form-label fw-bold text-dark">Area Coverage</label>
                        <input type="text" class="form-control" id="profileAreaCoverage"
                            placeholder="e.g. Karachi, Lahore, Islamabad">
                    </div>

                    <div class="mb-4">
                        <label for="profilePicFile" class="form-label fw-bold text-dark">Profile Picture</label>
                        <input type="file" class="form-control" id="profilePicFile" accept="image/*">
                        <small class="text-muted">Stored in database as base64 string.</small>
                    </div>

                    <div class="d-flex justify-content-end gap-2">
                        <button type="button" class="btn btn-outline-secondary" onclick="loadProfileData()">
                            Refresh
                        </button>
                        <button type="submit" class="btn btn-primary" id="saveProfileBtn">
                            <i class="fas fa-save me-1"></i> Save Changes
                        </button>
                    </div>
                </form>
                <div id="profileMessage" class="mt-3 small"></div>
            </div>
        </div>
    </div>
</div>

<script>
    let profilePicBase64Value = '';

    async function loadProfileData() {
        const address = localStorage.getItem('selectedAccount');
        const localName = localStorage.getItem('userName') || '';
        const role = (localStorage.getItem('userRole') || '').toLowerCase();
        const isBuyer = role === 'buyer';

        if (!address) {
            showProfileMessage('No active account found. Please login again.', 'danger');
            return;
        }

        document.getElementById('profileWallet').value = address;
        document.getElementById('profileName').value = localName;
        document.getElementById('profileEmail').value = '';
        document.getElementById('profileBio').value = '';
        document.getElementById('profileNiche').value = '';
        document.getElementById('profileRate').value = '';
        document.getElementById('profileAreaCoverage').value = '';

        document.getElementById('professionalFieldsRow').style.display = isBuyer ? 'none' : 'flex';
        document.getElementById('profileAreaCoverage').closest('.mb-3').style.display = isBuyer ? 'none' : 'block';

        try {
            const res = await fetch(`/api/user/profile/${address}`);
            if (!res.ok) {
                return;
            }
            const data = await res.json();
            if (data.name) {
                document.getElementById('profileName').value = data.name;
            }
            if (data.email) {
                document.getElementById('profileEmail').value = data.email;
            }
            if (data.bio) {
                document.getElementById('profileBio').value = data.bio;
            }
            if (data.niche) {
                document.getElementById('profileNiche').value = data.niche;
            }
            if (data.rate) {
                document.getElementById('profileRate').value = data.rate;
            }
            if (data.area_coverage) {
                document.getElementById('profileAreaCoverage').value = data.area_coverage;
            }
            if (data.profile_pic_base64) {
                profilePicBase64Value = data.profile_pic_base64;
                setProfilePreview(data.profile_pic_base64);
            } else {
                profilePicBase64Value = '';
                setProfilePreview('');
            }
        } catch (e) {
            showProfileMessage('Could not load profile details.', 'warning');
        }
    }

    function showProfileMessage(text, level) {
        const box = document.getElementById('profileMessage');
        box.className = `mt-3 small text-${level}`;
        box.innerText = text;
    }

    function setProfilePreview(base64Data) {
        const img = document.getElementById('profilePreview');
        if (!base64Data) {
            img.style.display = 'none';
            img.src = '';
            return;
        }
        img.src = base64Data;
        img.style.display = 'inline-block';
    }

    document.getElementById('profilePicFile').addEventListener('change', function (event) {
        const file = event.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = function (e) {
            profilePicBase64Value = e.target.result;
            setProfilePreview(profilePicBase64Value);
        };
        reader.readAsDataURL(file);
    });

    document.getElementById('editProfileForm').addEventListener('submit', async function (event) {
        event.preventDefault();
        const address = localStorage.getItem('selectedAccount');
        const name = document.getElementById('profileName').value.trim();
        const email = document.getElementById('profileEmail').value.trim();
        const bio = document.getElementById('profileBio').value.trim();
        const role = (localStorage.getItem('userRole') || '').toLowerCase();
        const isBuyer = role === 'buyer';
        const niche = isBuyer ? '' : document.getElementById('profileNiche').value.trim();
        const rate = isBuyer ? '' : document.getElementById('profileRate').value.trim();
        const areaCoverage = isBuyer ? '' : document.getElementById('profileAreaCoverage').value.trim();
        const btn = document.getElementById('saveProfileBtn');

        if (!address || !name || !email) {
            showProfileMessage('Name and email are required.', 'danger');
            return;
        }

        btn.disabled = true;
        btn.innerHTML = '<i class="fas fa-spinner fa-spin me-1"></i> Saving...';

        try {
            const res = await fetch('/api/user/profile', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    address,
                    name,
                    email,
                    bio,
                    niche,
                    rate,
                    area_coverage: areaCoverage,
                    profile_pic_base64: profilePicBase64Value
                })
            });
            const data = await res.json();
            if (!res.ok) {
                throw new Error(data.error || 'Failed to update profile.');
            }

            localStorage.setItem('userName', name);
            showProfileMessage('Profile updated successfully.', 'success');
            const navName = document.getElementById('navUserName');
            if (navName) navName.innerText = name;
        } catch (e) {
            showProfileMessage(e.message, 'danger');
        } finally {
            btn.disabled = false;
            btn.innerHTML = '<i class="fas fa-save me-1"></i> Save Changes';
        }
    });

    document.addEventListener('DOMContentLoaded', loadProfileData);
</script>
{% endblock %}
